<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ニンジンゲーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background-color: #0a0a0a;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* ネオンテキスト */
    .neon-text-pink { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #ff00de, 0 0 20px #ff00de, 0 0 40px #ff00de; }
    .neon-text-cyan { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #00f3ff, 0 0 20px #00f3ff, 0 0 40px #00f3ff; }
    .neon-text-green { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #39ff14, 0 0 20px #39ff14, 0 0 40px #39ff14; }
    .neon-text-red { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #ff004f, 0 0 20px #ff004f, 0 0 40px #ff004f; }
    .neon-text-yellow { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #ffea00, 0 0 20px #ffea00, 0 0 40px #ffea00; }

    /* ネオンボーダー */
    .neon-border-cyan { border: 2px solid #00f3ff; box-shadow: 0 0 10px #00f3ff, inset 0 0 10px #00f3ff; }
    .neon-border-pink { border: 2px solid #ff00de; box-shadow: 0 0 10px #ff00de, inset 0 0 10px #ff00de; }
    .neon-border-red { border: 2px solid #ff004f; box-shadow: 0 0 15px #ff004f, inset 0 0 15px #ff004f; }
    .neon-border-gray { border: 2px solid #4b5563; }

    /* ネオンボタン */
    .neon-btn { background: transparent; border: 2px solid; transition: all 0.2s ease-in-out; }
    .neon-btn-cyan { border-color: #00f3ff; color: #00f3ff; box-shadow: 0 0 5px #00f3ff, inset 0 0 5px #00f3ff; text-shadow: 0 0 5px #00f3ff; }
    .neon-btn-cyan:hover:not(:disabled) { background: #00f3ff; color: #000; box-shadow: 0 0 20px #00f3ff; text-shadow: none; }
    .neon-btn-cyan:disabled { opacity: 0.5; cursor: not-allowed; }

    .neon-btn-pink { border-color: #ff00de; color: #ff00de; box-shadow: 0 0 5px #ff00de, inset 0 0 5px #ff00de; text-shadow: 0 0 5px #ff00de; }
    .neon-btn-pink:hover:not(:disabled) { background: #ff00de; color: #000; box-shadow: 0 0 20px #ff00de; text-shadow: none; }

    .neon-btn-green { border-color: #39ff14; color: #39ff14; box-shadow: 0 0 5px #39ff14, inset 0 0 5px #39ff14; text-shadow: 0 0 5px #39ff14; }
    .neon-btn-green:hover:not(:disabled) { background: #39ff14; color: #000; box-shadow: 0 0 20px #39ff14; text-shadow: none; }

    .neon-btn-yellow { border-color: #ffea00; color: #ffea00; box-shadow: 0 0 5px #ffea00, inset 0 0 5px #ffea00; text-shadow: 0 0 5px #ffea00; }
    .neon-btn-yellow:hover:not(:disabled) { background: #ffea00; color: #000; box-shadow: 0 0 20px #ffea00; text-shadow: none; }

    .neon-btn-red { border-color: #ff004f; color: #ff004f; box-shadow: 0 0 5px #ff004f, inset 0 0 5px #ff004f; text-shadow: 0 0 5px #ff004f; }
    .neon-btn-red:hover:not(:disabled) { background: #ff004f; color: #000; box-shadow: 0 0 20px #ff004f; text-shadow: none; }

    /* アニメーション関連 */
    @keyframes card-enter {
      0% { transform: scale(0.8) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .card-enter { animation: card-enter 0.3s ease-out forwards; }

    /* ガチャ演出：カードが画面中央に大きく現れる */
    @keyframes gacha-pop {
      0% { transform: translate(-50%, -50%) scale(0.1) rotate(-10deg); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    }
    
    /* ガチャ演出：震える（溜めの表現） */
    @keyframes gacha-shake {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      25% { transform: translate(-52%, -48%) rotate(-2deg); }
      50% { transform: translate(-48%, -52%) rotate(2deg); }
      75% { transform: translate(-52%, -52%) rotate(-2deg); }
    }

    /* ガチャ演出：光を放つ */
    @keyframes flash-overlay {
      0% { background-color: rgba(255, 255, 255, 0); }
      50% { background-color: rgba(255, 255, 255, 0.9); }
      100% { background-color: rgba(255, 255, 255, 0); }
    }
    
    /* ガチャ演出：場に移動する */
    @keyframes gacha-move-to-field {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.5) translateY(200px); opacity: 0; }
    }

    /* フリップ（裏返り）アニメーション */
    @keyframes flip-anim {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(180deg); }
    }

    .gacha-pop-anim { animation: gacha-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .gacha-shake-anim { animation: gacha-shake 0.1s linear infinite; }
    .gacha-move-anim { animation: gacha-move-to-field 0.5s ease-in-out forwards; }
    .flash-anim { animation: flash-overlay 0.6s ease-out forwards; pointer-events: none; }
    .flip-active { animation: flip-anim 0.6s cubic-bezier(0.4, 0.2, 0.2, 1) forwards; }

    /* ターン開始アナウンス演出 */
    @keyframes turn-announce {
      0% { transform: scale(0.5); opacity: 0; }
      15% { transform: scale(1.1); opacity: 1; }
      85% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .turn-announce-anim { animation: turn-announce 2s ease-in-out forwards; }

    /* 3Dカードフリップ用 */
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    
    /* スクロールバー隠し */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 sm:py-10">

  <div id="app" class="w-full px-4"></div>

  <script>
    // --- カードデータ定義 ---
    const cardsData = [
      { id: 'heart', name: 'ハート', file: 'images/ha-to.jpg', type: 'normal', count: 3 },
      { id: 'aratte', name: 'はよ洗って', file: 'images/hayoaratte.jpg', type: 'normal', count: 3 },
      { id: 'myoon', name: 'みょーん', file: 'images/myo-nn.jpg', type: 'normal', count: 3 },
      { id: 'poko', name: 'ポコプロップス', file: 'images/pokopuroppusu.jpg', type: 'normal', count: 3 },
      { id: 'yakyuu', name: '野球', file: 'images/yakyuu.jpg', type: 'normal', count: 3 },
      { id: 'panda', name: '笹の葉パンダ', file: 'images/sasapann.jpg', type: 'normal', count: 3 },
      { id: 'bravo', name: 'ブラボー', file: 'images/burabo-.jpg', type: 'normal', count: 3 },
      { id: 'gold', name: 'ゴールドシャワー', file: 'images/go-rudosyawa-.jpg', type: 'normal', count: 3 },
      { id: 'tribal', name: 'トライバル', file: 'images/toraibaru.jpg', type: 'normal', count: 3 },
      { id: 'hanabi', name: '花火', file: 'images/hanabi.jpg', type: 'normal', count: 3 },
      { id: 'musi', name: '虫', file: 'images/musi.jpg', type: 'bug', count: 2 },
      // 追加カード
      { id: 'binta', name: 'ビンタ10回', file: 'images/binta.jpg', type: 'normal', count: 2 },
      { id: 'double', name: '次のカード得点2倍', file: 'images/double.jpg', type: 'effect', count: 2 },
      { id: 'noburst', name: '次のカード被っても無効', file: 'images/noburst.jpg', type: 'effect', count: 2 }
    ];

    // --- ゲームの状態管理 ---
    let state = {
      screen: 'START',
      players: [],
      currentPlayerIndex: 0,
      deck: [],
      turnCards: [],
      turnScore: 0,
      isBurst: false,
      burstCard: null,
      reach15: false,
      round: 1,
      isAnimating: false,
      gachaCard: null,
      showTurnAnnounce: false,
      // 特殊効果用フラグ
      nextCardDouble: false,
      nextCardNoBurst: false
    };

    // --- セーブ＆ロード機能（オートセーブ） ---
    function saveState() {
      localStorage.setItem('ninjinGameState', JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem('ninjinGameState');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
          state.isAnimating = false;
          state.gachaCard = null;
          state.showTurnAnnounce = false;
        } catch (e) {
          console.error('データの読み込みに失敗しました', e);
        }
      }
    }

    // --- ユーティリティ ---
    function shuffle(array) {
      let currentIndex = array.length, randomIndex;
      while (currentIndex != 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
      }
      return array;
    }

    function createDeck() {
      let newDeck = [];
      cardsData.forEach(card => {
        let count = card.count !== undefined ? card.count : 3;
        for(let i = 0; i < count; i++) {
          newDeck.push({...card, instanceId: Math.random().toString(36).substr(2, 9)});
        }
      });
      return shuffle(newDeck);
    }

    // --- ロジック関数 ---
    function addPlayer() {
      const input = document.getElementById('playerNameInput');
      const name = input.value.trim();
      if (name) {
        state.players.push({ name, score: 0 });
        input.value = '';
        render();
        setTimeout(() => document.getElementById('playerNameInput').focus(), 10);
      }
    }

    function removePlayer(index) {
      state.players.splice(index, 1);
      render();
    }

    function startGame() {
      if (state.players.length === 0) return;
      
      state.players = shuffle(state.players);
      state.players.forEach(p => p.score = 0);
      
      state.deck = createDeck();
      state.round = 1;
      state.reach15 = false;
      state.screen = 'GAME';
      
      startRound();
    }

    function startRound() {
      state.currentPlayerIndex = 0;
      startPlayerTurn();
    }

    function startPlayerTurn() {
      state.turnCards = [];
      state.turnScore = 0;
      state.isBurst = false;
      state.burstCard = null;
      state.gachaCard = null;
      
      // ターン開始時に効果リセット
      state.nextCardDouble = false;
      state.nextCardNoBurst = false;
      
      state.deck = createDeck();
      
      state.showTurnAnnounce = true;
      state.isAnimating = true;
      
      render();

      setTimeout(() => {
        state.showTurnAnnounce = false;
        state.isAnimating = false;
        render();
      }, 2000);
    }

    function drawCard() {
      if (state.isAnimating) return;
      if (state.isBurst) return;
      
      if (state.deck.length === 0) {
        state.deck = createDeck();
      }
      
      const card = state.deck.pop();
      const playingCard = { ...card, isFlipped: false, justDrawn: true };
      
      state.gachaCard = { ...playingCard, phase: 'pop' }; 
      state.isAnimating = true;
      
      render();

      setTimeout(() => {
        state.gachaCard.phase = 'shake';
        render();
        
        setTimeout(() => {
          state.gachaCard.phase = 'flash';
          state.gachaCard.isFlipped = true;
          render();

          setTimeout(() => {
            state.gachaCard.phase = 'move';
            render();
            
            setTimeout(() => {
              state.gachaCard = null;
              playingCard.isFlipped = true;
              playingCard.justDrawn = false;
              
              // 引いたカードを場に追加
              state.turnCards.push(playingCard);
              
              // 被り判定
              const count = state.turnCards.filter(c => c.id === card.id).length;
              let isBurstTriggered = (count >= 2);

              // 「被り無効」効果の適用
              if (isBurstTriggered && state.nextCardNoBurst) {
                isBurstTriggered = false; // バースト回避
                state.nextCardNoBurst = false; // 効果を消費
              }

              if (isBurstTriggered) {
                // バースト処理
                state.isBurst = true;
                state.turnScore = 0;
                state.burstCard = playingCard;
                state.nextCardDouble = false; // 効果リセット
                state.nextCardNoBurst = false; // 効果リセット
              } else {
                // 得点計算処理
                let pts = 0;
                if (playingCard.id === 'musi') {
                  pts = -1;
                } else if (playingCard.type === 'effect') {
                  pts = 0;
                } else {
                  pts = 1; // binta含む通常アイテム
                }
                
                // 「得点2倍」効果の適用（効果カード以外に適用）
                if (state.nextCardDouble && playingCard.type !== 'effect') {
                  pts *= 2;
                  state.nextCardDouble = false; // 効果を消費
                }
                
                playingCard.earnedPoints = pts;
                state.turnScore += pts;

                // 次のカードへの効果をセット
                if (playingCard.id === 'double') state.nextCardDouble = true;
                if (playingCard.id === 'noburst') state.nextCardNoBurst = true;
              }
              
              state.isAnimating = false;
              render();
            }, 500);
          }, 800);
        }, 600);
      }, 500);
    }

    function endTurn() {
      if (!state.isBurst) {
        state.players[state.currentPlayerIndex].score += state.turnScore;
      }
      
      if (state.players[state.currentPlayerIndex].score >= 15) {
        state.reach15 = true;
      }
      
      state.currentPlayerIndex++;
      
      if (state.currentPlayerIndex >= state.players.length) {
        if (state.reach15 || state.round >= 4) {
          state.screen = 'RESULT';
        } else {
          state.round++;
          startRound();
          return;
        }
      } else {
        startPlayerTurn();
        return;
      }
      
      render();
    }

    function resetToTop() {
      state.screen = 'START';
      state.players = [];
      render();
    }

    // --- 描画 (UI) 関数 ---
    function renderStart() {
      return `
        <div class="max-w-2xl mx-auto text-center w-full">
          <h1 class="text-4xl sm:text-6xl md:text-7xl font-black mb-2 sm:mb-4 neon-text-pink tracking-widest mt-4 sm:mt-10">ニンジンゲーム</h1>
          <p class="text-base sm:text-xl text-gray-300 mb-8 sm:mb-12 tracking-wider">チキンレース得点稼ぎゲーム</p>
          
          <div class="bg-gray-900/80 p-4 sm:p-8 rounded-2xl neon-border-cyan mb-8 shadow-2xl">
            <h2 class="text-xl sm:text-2xl mb-4 sm:mb-6 text-cyan-300 font-bold">プレイヤー登録</h2>
            
            <div class="flex flex-col sm:flex-row gap-3 mb-6">
              <input type="text" id="playerNameInput" placeholder="プレイヤー名を入力..." 
                onkeypress="if(event.key === 'Enter') addPlayer()"
                class="flex-1 p-3 sm:p-4 rounded bg-black border border-cyan-500 text-white text-base sm:text-lg focus:outline-none focus:ring-2 focus:ring-cyan-400">
              <button onclick="addPlayer()" class="w-full sm:w-auto px-6 py-3 sm:py-0 rounded font-bold neon-btn neon-btn-cyan text-base sm:text-lg">追加</button>
            </div>

            <ul class="text-left space-y-2 sm:space-y-3 mb-6 sm:mb-8 max-h-48 sm:max-h-60 overflow-y-auto pr-2">
              ${state.players.length === 0 ? '<li class="text-gray-500 text-center py-4 text-sm sm:text-base">プレイヤーがいません</li>' : ''}
              ${state.players.map((p, i) => `
                <li class="flex justify-between items-center bg-black p-3 sm:p-4 rounded-lg border border-gray-700 shadow">
                  <span class="text-lg sm:text-xl font-bold truncate max-w-[70%]">${p.name}</span>
                  <button onclick="removePlayer(${i})" class="text-red-500 hover:text-red-400 font-bold text-xs sm:text-sm bg-gray-800 px-3 py-1 rounded">削除</button>
                </li>
              `).join('')}
            </ul>

            <button onclick="startGame()" class="w-full py-4 sm:py-5 text-xl sm:text-2xl font-black rounded neon-btn neon-btn-pink tracking-widest" 
              ${state.players.length === 0 ? 'disabled' : ''}>
              START GAME
            </button>
          </div>
        </div>
      `;
    }

    function renderGame() {
      const currentPlayer = state.players[state.currentPlayerIndex];
      
      return `
        <div class="max-w-5xl mx-auto w-full">
          <!-- スコアボード表示 -->
          <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-4 sm:mb-6">
            ${state.players.map((p, i) => `
              <div class="min-w-[80px] sm:min-w-[120px] px-2 sm:px-4 py-2 sm:py-3 rounded-xl transition-all duration-300 ${i === state.currentPlayerIndex ? 'neon-border-pink bg-pink-900/20 scale-105 sm:scale-110 z-10' : 'neon-border-gray bg-gray-900 opacity-70'} text-center">
                <div class="text-xs sm:text-sm font-bold truncate max-w-[70px] sm:max-w-[100px] mx-auto ${i === state.currentPlayerIndex ? 'text-pink-300' : 'text-gray-400'}">${p.name}</div>
                <div class="text-xl sm:text-3xl font-black ${i === state.currentPlayerIndex ? 'neon-text-pink' : 'text-white'}">${p.score}<span class="text-xs sm:text-sm font-normal">pt</span></div>
              </div>
            `).join('')}
          </div>

          <!-- メインプレイエリア -->
          <div class="bg-gray-900/90 p-4 sm:p-8 rounded-2xl sm:rounded-3xl neon-border-cyan text-center relative shadow-2xl">
            <div class="absolute top-3 sm:top-4 left-4 sm:left-6 text-sm sm:text-xl text-cyan-500 font-bold tracking-widest">ROUND ${state.round} / 4</div>
            
            <div class="mt-6 sm:mt-4 mb-4 sm:mb-6">
              <span class="text-2xl sm:text-4xl md:text-5xl font-black neon-text-pink break-all">${currentPlayer.name}</span>
              <span class="text-lg sm:text-2xl text-gray-300 ml-1 sm:ml-2">のターン！</span>
            </div>
            
            <!-- 仮スコア -->
            <div class="mb-6 sm:mb-10 bg-black/50 inline-block px-6 sm:px-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl border border-gray-800 relative">
              <div class="text-xs sm:text-sm text-gray-400 mb-1">このターンで獲得する点数</div>
              <div class="text-4xl sm:text-6xl font-black ${state.turnScore < 0 ? 'text-red-500' : 'neon-text-green'}">
                ${state.turnScore > 0 ? '+' : ''}${state.turnScore} <span class="text-lg sm:text-2xl font-normal">pt</span>
              </div>
              <!-- アクティブな効果インジケーター -->
              <div class="absolute -bottom-4 left-1/2 transform -translate-x-1/2 flex gap-2 w-full justify-center">
                ${state.nextCardDouble ? '<span class="bg-purple-600/90 text-white text-xs px-2 py-1 rounded shadow-md border border-purple-400 whitespace-nowrap">🔥 次の得点2倍</span>' : ''}
                ${state.nextCardNoBurst ? '<span class="bg-blue-600/90 text-white text-xs px-2 py-1 rounded shadow-md border border-blue-400 whitespace-nowrap">🛡️ 次の被り無効</span>' : ''}
              </div>
            </div>

            <!-- アクション・結果エリア -->
            <div class="min-h-[100px] sm:min-h-[120px] flex items-center justify-center mb-6 sm:mb-8 w-full">
              ${state.isBurst ? `
                <div class="animate-pulse w-full">
                  <div class="text-4xl sm:text-6xl font-black neon-text-red mb-2 sm:mb-4 tracking-widest">BURST!!</div>
                  <div class="text-lg sm:text-2xl text-yellow-300 mb-2 font-bold break-words px-2">「${state.burstCard.name}」が被りました！</div>
                  <div class="text-lg sm:text-3xl md:text-4xl font-black mt-2 sm:mt-4 neon-text-pink bg-pink-900/40 py-3 sm:py-3 rounded-lg border border-pink-500 inline-block px-4 sm:px-8 mx-2 leading-snug">
                    アイテム「${state.burstCard.name}」を投げて！
                  </div>
                  <div class="mt-6">
                    <button onclick="endTurn()" class="w-full sm:w-auto px-6 sm:px-10 py-3 sm:py-4 rounded-xl font-bold text-xl sm:text-2xl neon-btn neon-btn-red tracking-widest">次の人へ</button>
                  </div>
                </div>
              ` : `
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full px-2 sm:px-0 justify-center">
                  ${state.turnCards.length === 0 ? `
                    <button onclick="drawCard()" class="w-full sm:w-auto px-6 sm:px-10 py-4 sm:py-5 rounded-xl font-black text-xl sm:text-2xl neon-btn neon-btn-green tracking-widest disabled:opacity-50 disabled:cursor-not-allowed" ${state.isAnimating ? 'disabled' : ''}>カードを引く</button>
                  ` : `
                    <button onclick="drawCard()" class="w-full sm:w-auto px-6 sm:px-10 py-4 sm:py-5 rounded-xl font-black text-xl sm:text-2xl neon-btn neon-btn-green tracking-widest disabled:opacity-50 disabled:cursor-not-allowed" ${state.isAnimating ? 'disabled' : ''}>もう１枚引く</button>
                    <button onclick="endTurn()" class="w-full sm:w-auto px-6 sm:px-10 py-4 sm:py-5 rounded-xl font-black text-xl sm:text-2xl neon-btn neon-btn-yellow tracking-widest disabled:opacity-50 disabled:cursor-not-allowed" ${state.isAnimating ? 'disabled' : ''}>やめる</button>
                  `}
                </div>
              `}
            </div>

            <!-- 場に出たカード一覧 -->
            <div class="flex flex-wrap justify-center gap-2 sm:gap-4 min-h-[150px] sm:min-h-[220px] p-2 sm:p-4 bg-black/60 rounded-xl border border-gray-800 relative z-0">
              ${state.turnCards.length === 0 ? '<div class="text-gray-600 flex items-center text-sm sm:text-base">カードがここに表示されます</div>' : ''}
              ${state.turnCards.map((card, idx) => {
                let badgeHtml = '';
                if (card.type === 'effect') {
                  badgeHtml = '<div class="absolute -top-2 -right-2 sm:-top-3 sm:-right-3 bg-purple-500 border sm:border-2 border-white text-white text-[10px] sm:text-sm px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-full font-black shadow-lg transform rotate-12 leading-none">効果</div>';
                } else if (card.id === 'musi') {
                  badgeHtml = `<div class="absolute -top-2 -right-2 sm:-top-3 sm:-right-3 bg-red-600 border sm:border-2 border-white text-white text-[10px] sm:text-sm px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-full font-black shadow-lg transform rotate-12 leading-none">${card.earnedPoints !== undefined ? card.earnedPoints : -1}pt</div>`;
                } else {
                  badgeHtml = `<div class="absolute -top-2 -right-2 sm:-top-3 sm:-right-3 bg-green-500 border sm:border-2 border-white text-black text-[10px] sm:text-sm px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-full font-black shadow-lg transform rotate-12 leading-none">+${card.earnedPoints !== undefined ? card.earnedPoints : 1}pt</div>`;
                }

                return `
                <div class="w-20 sm:w-28 md:w-36 h-28 sm:h-40 md:h-52 perspective-1000">
                  <div class="w-full h-full relative transform-style-3d rotate-y-180">
                    <!-- 表面 -->
                    <div class="absolute inset-0 bg-gray-900 rounded-lg sm:rounded-xl border-2 ${state.isBurst && card.id === state.burstCard?.id ? 'neon-border-red bg-red-900/30 animate-bounce' : 'neon-border-cyan'} flex flex-col items-center justify-center p-1 sm:p-2 backface-hidden rotate-y-180 shadow-lg">
                      <img src="${card.file}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" class="w-full h-full object-contain drop-shadow-md" alt="${card.name}" />
                      <div class="hidden w-full h-full flex-col items-center justify-center text-center">
                        <span class="text-xs sm:text-sm md:text-lg font-bold break-words w-full neon-text-cyan leading-tight px-1">${card.name}</span>
                      </div>
                      ${badgeHtml}
                    </div>
                  </div>
                </div>
              `}).join('')}
            </div>
          </div>
          
          <!-- ガチャ演出オーバーレイ -->
          ${state.gachaCard ? (() => {
            let gachaBadge = '';
            if (state.gachaCard.type === 'effect') {
              gachaBadge = '<div class="absolute -top-4 -right-4 bg-purple-500 border-4 border-white text-white text-xl sm:text-2xl px-4 py-2 rounded-full font-black shadow-[0_0_20px_rgba(168,85,247,0.8)] transform rotate-12 z-20">特殊効果</div>';
            } else if (state.gachaCard.id === 'musi') {
              gachaBadge = '<div class="absolute -top-4 -right-4 bg-red-600 border-4 border-white text-white text-xl sm:text-2xl px-4 py-2 rounded-full font-black shadow-[0_0_20px_rgba(255,0,0,0.8)] transform rotate-12 z-20">-1pt</div>';
            } else {
              gachaBadge = '<div class="absolute -top-4 -right-4 bg-green-500 border-4 border-white text-black text-xl sm:text-2xl px-4 py-2 rounded-full font-black shadow-[0_0_20px_rgba(0,255,0,0.8)] transform rotate-12 z-20">+1pt</div>';
            }

            return `
            <div class="fixed inset-0 z-50 flex items-center justify-center overflow-hidden">
              <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity duration-300 ${state.gachaCard.phase === 'move' ? 'opacity-0' : 'opacity-100'}"></div>
              ${state.gachaCard.phase === 'flash' ? '<div class="absolute inset-0 flash-anim z-40"></div>' : ''}
              
              <div class="absolute top-1/2 left-1/2 w-48 sm:w-64 md:w-80 h-72 sm:h-96 md:h-[400px] perspective-1000 z-50 
                ${state.gachaCard.phase === 'pop' ? 'gacha-pop-anim' : ''}
                ${state.gachaCard.phase === 'shake' ? 'gacha-shake-anim' : ''}
                ${state.gachaCard.phase === 'flash' ? 'transform -translate-x-1/2 -translate-y-1/2' : ''}
                ${state.gachaCard.phase === 'move' ? 'gacha-move-anim' : ''}
              ">
                <div class="w-full h-full relative transform-style-3d ${state.gachaCard.isFlipped ? 'flip-active' : ''}">
                  <div class="absolute inset-0 bg-gray-800 rounded-2xl border-4 neon-border-pink flex flex-col items-center justify-center backface-hidden shadow-[0_0_50px_rgba(255,0,222,0.5)]">
                    <span class="text-6xl sm:text-8xl font-black neon-text-pink animate-pulse">🥕</span>
                  </div>
                  
                  <div class="absolute inset-0 bg-gray-900 rounded-2xl border-4 neon-border-cyan flex flex-col items-center justify-center p-4 backface-hidden rotate-y-180 shadow-[0_0_50px_rgba(0,243,255,0.6)] bg-gradient-to-br from-gray-800 to-black">
                    <div class="absolute inset-0 rounded-2xl bg-gradient-to-tr from-transparent via-cyan-500/10 to-transparent opacity-50"></div>
                    <img src="${state.gachaCard.file}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" class="w-full h-full object-contain drop-shadow-2xl z-10" alt="${state.gachaCard.name}" />
                    <div class="hidden w-full h-full flex-col items-center justify-center text-center z-10">
                      <span class="text-3xl sm:text-4xl md:text-5xl font-bold break-words w-full neon-text-cyan leading-tight px-2">${state.gachaCard.name}</span>
                    </div>
                    ${gachaBadge}
                  </div>
                </div>
              </div>
            </div>
          `})() : ''}

          <!-- ターン開始アナウンスのオーバーレイ -->
          ${state.showTurnAnnounce ? `
            <div class="fixed inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-sm pointer-events-none">
              <div class="turn-announce-anim text-center px-4">
                <div class="text-5xl sm:text-7xl md:text-8xl font-black neon-text-pink mb-4 break-words leading-tight drop-shadow-[0_0_20px_rgba(255,0,222,0.8)]">${currentPlayer.name}</div>
                <div class="text-3xl sm:text-5xl font-bold text-gray-200 tracking-widest drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">のターン！</div>
              </div>
            </div>
          ` : ''}

        </div>
      `;
    }

    function renderResult() {
      const sortedPlayers = [...state.players].sort((a, b) => b.score - a.score);
      const highestScore = sortedPlayers[0].score;
      const lowestScore = sortedPlayers[sortedPlayers.length - 1].score;
      const winners = sortedPlayers.filter(p => p.score === highestScore);

      return `
        <div class="max-w-3xl mx-auto text-center py-6 sm:py-10 w-full">
          <h1 class="text-4xl sm:text-6xl md:text-7xl font-black mb-6 sm:mb-8 neon-text-yellow tracking-widest animate-pulse">GAME FINISH!</h1>
          
          <div class="bg-gray-900/90 p-6 sm:p-12 rounded-2xl sm:rounded-3xl neon-border-cyan mb-8 sm:mb-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 sm:h-2 bg-gradient-to-r from-pink-500 via-cyan-500 to-yellow-500"></div>
            
            <h2 class="text-2xl sm:text-3xl mb-4 sm:mb-8 text-yellow-300 font-bold tracking-widest">👑 WINNER 👑</h2>
            <div class="text-3xl sm:text-5xl md:text-7xl neon-text-pink font-black mb-8 sm:mb-12 leading-tight break-words px-2">
              ${winners.map(w => w.name).join(' <span class="text-xl sm:text-3xl text-gray-500">&</span> ')}
            </div>
            
            <div class="space-y-3 sm:space-y-4 text-left max-w-xl mx-auto">
              ${sortedPlayers.map((p, i) => `
                <div class="flex flex-col bg-black p-4 sm:p-5 rounded-lg sm:rounded-xl border ${p.score === highestScore ? 'border-yellow-500 neon-text-yellow' : p.score === lowestScore ? 'border-red-500 text-red-300' : 'border-gray-700 text-gray-300'}">
                  <div class="flex justify-between items-center text-lg sm:text-2xl">
                    <span class="font-bold truncate max-w-[65%] sm:max-w-[70%]">
                      <span class="${p.score === highestScore ? 'text-yellow-400' : p.score === lowestScore ? 'text-red-500' : 'text-gray-500'} mr-2 sm:mr-4 text-base sm:text-xl">${i+1}位</span> 
                      ${p.name}
                    </span>
                    <span class="font-black ${p.score >= 15 ? 'neon-text-green' : ''} whitespace-nowrap ml-2">${p.score} pt</span>
                  </div>
                  ${p.score === lowestScore ? `
                    <div class="mt-3 text-center bg-red-900/40 border border-red-500 text-red-400 font-bold py-2 rounded-lg text-sm sm:text-base animate-pulse shadow-[0_0_10px_rgba(255,0,0,0.5)]">
                      💀 111コイン消費！
                    </div>
                  ` : ''}
                </div>
              `).join('')}
            </div>
          </div>
          
          <button onclick="resetToTop()" class="w-full sm:w-auto px-8 sm:px-12 py-4 sm:py-5 text-xl sm:text-2xl font-black rounded-xl neon-btn neon-btn-cyan tracking-widest">トップへ戻る</button>
        </div>
      `;
    }

    function render() {
      saveState();

      const app = document.getElementById('app');
      if (state.screen === 'START') {
        app.innerHTML = renderStart();
      } else if (state.screen === 'GAME') {
        app.innerHTML = renderGame();
      } else if (state.screen === 'RESULT') {
        app.innerHTML = renderResult();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadState();
      render();
    });
  </script>
</body>
</html>
